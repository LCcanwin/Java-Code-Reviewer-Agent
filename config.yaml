github:
  token_env: GITHUB_TOKEN
  api_url: https://api.github.com

gitlab:
  token_env: GITLAB_TOKEN
  api_url: https://gitlab.com/api/v4

llm:
  provider: openai
  model: gpt-4o
  temperature: 0
  max_tokens: 8192

review:
  max_files: 50
  max_context_lines: 100

git:
  clone_depth: 1
  branch_prefix: java-reviewer/

rag:
  vector_store: faiss
  embedding_model: text-embedding-3-small
  top_k: 5

context:
  max_chars_per_file: 6000
  providers:
    alibaba_rules:
      enabled: true
    repo_index_mcp:
      enabled: false
      server: code_search
      max_files: 20
      max_snippets_per_file: 5
      include_tests: true
      include_references: true
      include_related_files: true
